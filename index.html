<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Tater's Treasures — Bourbon Gacha</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a0f00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0e0800;
      --surface:   #1c1008;
      --wood:      #5c3010;
      --wood-lt:   #8b4c1e;
      --amber:     #c8720a;
      --amber-lt:  #f0a830;
      --cream:     #f5e8c8;
      --grey-b:    #9aa0a6;
      --green-b:   #34a853;
      --blue-b:    #4285f4;
      --purple-b:  #9c27b0;
      --gold-b:    #ffd700;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Libre Baskerville', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
    }

    /* ── Scanline texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.08) 3px,
        rgba(0,0,0,.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: linear-gradient(180deg, #2a1505 0%, var(--bg) 100%);
      border-bottom: 2px solid var(--wood);
      position: relative;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: .04em;
      color: var(--amber-lt);
      text-shadow: 0 0 20px rgba(240,168,48,.4);
    }
    .logo span { color: var(--cream); font-style: italic; }

    .hud {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .ticket-counter {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--wood-lt);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: .9rem;
      font-weight: 700;
      color: var(--amber-lt);
    }
    .ticket-counter svg { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-inv {
      background: none;
      border: 2px solid var(--wood-lt);
      color: var(--cream);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: .85rem;
      transition: all .2s;
    }
    .btn-inv:hover { background: var(--wood); border-color: var(--amber); color: var(--amber-lt); }

    /* ── Main stage ── */
    #stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 68px);
      padding: 20px;
      padding-bottom: 100px;
      position: relative;
    }

    /* ── Ground ── */
    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(180deg, transparent 0%, #1a0a00 40%, #0d0500 100%);
    }
    .ground::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--wood-lt), var(--amber), var(--wood-lt), transparent);
      opacity: .5;
    }

    /* ── Barrel ── */
    .barrel-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .store-scene {
      position: relative;
      width: min(340px, 88vw);
      height: min(260px, 67vw);
      flex-shrink: 0;
    }

    /* Store SVG fills its container */
    .store-svg {
      width: 100%;
      height: 100%;
    }

    /* Left and right door panels — overlay SVGs that slide off sideways */
    .door-left, .door-right {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    @keyframes door-slide-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-26%); }
    }
    @keyframes door-slide-right {
      0%   { transform: translateX(0); }
      100% { transform: translateX(26%); }
    }
    .door-left.opening  { animation: door-slide-left  .6s cubic-bezier(.4,0,.2,1) forwards; }
    .door-right.opening { animation: door-slide-right .6s cubic-bezier(.4,0,.2,1) forwards; }

    /* Bottle emerging from store — scales up and moves down toward viewer */
    .bottle-emerge {
      position: absolute;
      /* centered in the doorway */
      left: 50%;
      bottom: 22%;
      transform: translateX(-50%) scale(0);
      opacity: 0;
      pointer-events: none;
      transform-origin: center bottom;
      width: min(66px, 17vw);
    }

    @keyframes bottle-emerge {
      0%   { transform: translateX(-50%) scale(0.15); opacity: 0; }
      15%  { opacity: 1; }
      80%  { transform: translateX(-50%) scale(1.1);  opacity: 1; }
      100% { transform: translateX(-50%) scale(1.0);  opacity: 1; }
    }
    .bottle-emerge.emerging {
      animation: bottle-emerge 1.1s cubic-bezier(.22,.68,0,1.2) forwards;
    }

    /* ── Roll button ── */
    .roll-btn {
      position: relative;
      background: linear-gradient(135deg, #8b3a0a 0%, #c8520a 40%, #e07010 60%, #8b3a0a 100%);
      border: none;
      border-radius: 12px;
      color: var(--cream);
      cursor: pointer;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: .1em;
      padding: 16px 48px;
      text-transform: uppercase;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 24px rgba(200,114,10,.4), inset 0 1px 0 rgba(255,255,255,.15);
    }
    .roll-btn::before {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.1);
      pointer-events: none;
    }
    .roll-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,114,10,.6), inset 0 1px 0 rgba(255,255,255,.2);
    }
    .roll-btn:active:not(:disabled) { transform: translateY(1px); }
    .roll-btn:disabled { opacity: .4; cursor: not-allowed; }

    .roll-btn .cost-tag {
      display: block;
      font-family: 'Libre Baskerville', serif;
      font-size: .72rem;
      font-weight: 400;
      opacity: .8;
      letter-spacing: .05em;
      margin-top: 2px;
    }

    /* ── Dim overlay for item reveal ── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
      transition: background .5s;
    }
    #overlay.active {
      background: rgba(0,0,0,.82);
      pointer-events: all;
    }

    /* ── Item reveal card ── */
    .item-card {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 36px 40px;
      border-radius: 16px;
      max-width: 380px;
      width: 90%;
      position: relative;
      transform: scale(.7);
      opacity: 0;
      transition: transform .45s cubic-bezier(.34,1.56,.64,1), opacity .35s;
      text-align: center;
    }
    .item-card.show {
      display: flex;
      transform: scale(1);
      opacity: 1;
    }

    /* Rarity borders */
    .item-card.common   { border: 3px solid var(--grey-b);   background: rgba(154,160,166,.08); }
    .item-card.uncommon { border: 3px solid var(--green-b);  background: rgba(52,168,83,.08); }
    .item-card.rare     { border: 3px solid var(--blue-b);   background: rgba(66,133,244,.08); }
    .item-card.epic     { border: 3px solid var(--purple-b); background: rgba(156,39,176,.08); }
    .item-card.legendary {
      border: 3px solid var(--gold-b);
      background: rgba(255,215,0,.06);
      box-shadow: 0 0 60px rgba(255,215,0,.25), 0 0 120px rgba(255,215,0,.1);
    }

    /* Rarity shimmer for legendary */
    @keyframes gold-pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(255,215,0,.2), 0 0 80px rgba(255,215,0,.1); }
      50%       { box-shadow: 0 0 80px rgba(255,215,0,.5), 0 0 160px rgba(255,215,0,.2); }
    }
    .item-card.legendary.show { animation: gold-pulse 2s ease-in-out infinite; }

    .rarity-badge {
      font-family: 'Playfair Display', serif;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 999px;
    }
    .common   .rarity-badge { color: var(--grey-b);   border: 1px solid var(--grey-b); }
    .uncommon .rarity-badge { color: var(--green-b);  border: 1px solid var(--green-b); }
    .rare     .rarity-badge { color: var(--blue-b);   border: 1px solid var(--blue-b); }
    .epic     .rarity-badge { color: var(--purple-b); border: 1px solid var(--purple-b); }
    .legendary .rarity-badge { color: var(--gold-b); border: 1px solid var(--gold-b); }

    .item-icon {
      font-size: 5rem;
      line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .item-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,.6));
      border-radius: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .item-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.3;
    }

    .item-msrp {
      font-size: .85rem;
      opacity: .7;
      font-style: italic;
    }

    .item-stats-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      width: 100%;
    }
    .item-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-label {
      font-size: .68rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      opacity: .5;
      font-family: 'Libre Baskerville', serif;
    }
    .stat-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--amber-lt);
    }

    .item-desc {
      font-size: .82rem;
      line-height: 1.65;
      opacity: .72;
      font-style: italic;
      text-align: center;
      max-width: 300px;
    }

    .item-rating {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: 100%;
    }
    .rating-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--amber-lt);
      letter-spacing: .04em;
    }
    .stars {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      align-items: center;
      justify-content: center;
      max-width: 220px;
    }
    .stars svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .legendary-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-style: italic;
      font-weight: 700;
      color: var(--gold-b);
      letter-spacing: .05em;
      text-shadow: 0 0 20px rgba(255,215,0,.6);
      display: none;
    }
    .legendary .legendary-text { display: block; }

    .btn-next {
      margin-top: 8px;
      background: linear-gradient(135deg, #2a1505, #5c3010);
      border: 2px solid var(--amber);
      color: var(--amber-lt);
      border-radius: 8px;
      padding: 12px 36px;
      cursor: pointer;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      transition: all .2s;
    }
    .btn-next:hover { background: var(--wood); box-shadow: 0 4px 16px rgba(200,114,10,.3); }

    /* ── Floating particles for legendary ── */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 101; display: none; }
    .particles.active { display: block; }
    .particle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-b);
      pointer-events: none;
    }
    @keyframes particle-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ── Inventory Panel ── */
    #inv-panel {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.9);
      z-index: 200;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #inv-panel.open { display: flex; }

    .inv-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 2px solid var(--wood);
      background: linear-gradient(180deg, #2a1505, var(--bg));
      flex-shrink: 0;
    }
    .inv-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--amber-lt);
    }
    .inv-actions { display: flex; gap: 10px; }
    .btn-close, .btn-reset {
      border: 2px solid;
      border-radius: 8px;
      padding: 6px 16px;
      cursor: pointer;
      font-family: inherit;
      font-size: .85rem;
      transition: all .2s;
      background: none;
    }
    .btn-close { border-color: var(--wood-lt); color: var(--cream); }
    .btn-close:hover { background: var(--wood); }
    .btn-reset { border-color: #c0392b; color: #e74c3c; }
    .btn-reset:hover { background: rgba(192,57,43,.2); }

    .inv-stats {
      display: flex;
      gap: 20px;
      padding: 12px 24px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: .8rem;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .inv-sort-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255,255,255,.02);
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .sort-label {
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      opacity: .4;
      font-family: 'Libre Baskerville', serif;
      margin-right: 2px;
    }
    .sort-btn {
      background: none;
      border: 1px solid rgba(255,255,255,.15);
      color: var(--cream);
      border-radius: 999px;
      padding: 4px 12px;
      font-family: inherit;
      font-size: .75rem;
      cursor: pointer;
      opacity: .55;
      transition: all .18s;
    }
    .sort-btn:hover { opacity: .85; border-color: var(--amber); }
    .sort-btn.active {
      background: var(--wood);
      border-color: var(--amber);
      color: var(--amber-lt);
      opacity: 1;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid;
      font-weight: 700;
    }
    .stat-chip.c  { border-color: var(--grey-b);   color: var(--grey-b); }
    .stat-chip.u  { border-color: var(--green-b);  color: var(--green-b); }
    .stat-chip.r  { border-color: var(--blue-b);   color: var(--blue-b); }
    .stat-chip.e  { border-color: var(--purple-b); color: var(--purple-b); }
    .stat-chip.l  { border-color: var(--gold-b);   color: var(--gold-b); }

    .inv-grid {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      align-content: start;
    }
    .inv-grid::-webkit-scrollbar { width: 6px; }
    .inv-grid::-webkit-scrollbar-track { background: transparent; }
    .inv-grid::-webkit-scrollbar-thumb { background: var(--wood); border-radius: 3px; }

    .inv-item {
      background: rgba(255,255,255,.04);
      border-radius: 10px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      position: relative;
      transition: transform .2s;
    }
    .inv-item:hover { transform: translateY(-3px); }
    .inv-item.common   { border: 2px solid var(--grey-b); }
    .inv-item.uncommon { border: 2px solid var(--green-b); }
    .inv-item.rare     { border: 2px solid var(--blue-b); }
    .inv-item.epic     { border: 2px solid var(--purple-b); }
    .inv-item.legendary{ border: 2px solid var(--gold-b); box-shadow: 0 0 20px rgba(255,215,0,.15); }

    .inv-item .i-icon {
      font-size: 2.4rem;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .inv-item .i-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
    }
    .inv-item .i-name { font-size: .72rem; font-weight: 700; color: var(--cream); line-height: 1.3; }
    .inv-item .i-proof { font-size: .64rem; color: var(--amber-lt); opacity: .85; }
    .inv-item .i-msrp { font-size: .65rem; opacity: .6; }
    .inv-count {
      position: absolute;
      top: 6px; right: 6px;
      background: var(--amber);
      color: #000;
      font-size: .65rem;
      font-weight: 900;
      border-radius: 999px;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .inv-empty {
      grid-column: 1 / -1;
      text-align: center;
      opacity: .4;
      padding: 60px 20px;
      font-style: italic;
    }

    /* ── Toast message ── */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(30,15,0,.95);
      border: 1px solid var(--amber);
      color: var(--cream);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .85rem;
      opacity: 0;
      transition: all .3s;
      z-index: 500;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Mobile-first overhaul ── */

    /* Use full viewport height accounting for browser chrome */
    body {
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      flex-shrink: 0;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
    }

    #stage {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Store scales to fill the stage nicely */
    .store-scene {
      width: min(340px, 88vw);
      height: min(260px, 67vw);
    }
    .store-svg {
      width: 100%;
      height: 100%;
    }

    .barrel-wrap {
      gap: 24px;
      width: 100%;
      align-items: center;
    }

    /* Roll button: full-width, pinned to bottom with safe area */
    .roll-btn {
      width: calc(100% - 32px);
      max-width: 400px;
      padding: 18px 24px;
      font-size: 1.1rem;
      border-radius: 14px;
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom, 20px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
    }
    .roll-btn:hover:not(:disabled) { transform: translateX(-50%) translateY(-2px); }
    .roll-btn:active:not(:disabled) { transform: translateX(-50%) translateY(1px); }

    /* Shrink logo a touch on small screens */
    .logo { font-size: 1.3rem; }

    /* Tighter header HUD */
    .hud { gap: 10px; }
    .ticket-counter { padding: 5px 12px; font-size: .82rem; }
    .btn-inv { padding: 6px 12px; font-size: .8rem; }

    /* Item card: safe padding, scroll if needed */
    .item-card {
      width: 92%;
      max-width: 360px;
      padding: 28px 24px 24px;
      gap: 14px;
      max-height: 90dvh;
      overflow-y: auto;
    }

    /* Inventory panel: safe area aware */
    #inv-panel {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .inv-header {
      padding: 14px 16px;
      padding-top: max(14px, env(safe-area-inset-top));
    }
    .inv-title { font-size: 1.2rem; }
    .btn-close, .btn-reset { padding: 6px 12px; font-size: .8rem; }

    .inv-stats { padding: 10px 16px; gap: 8px; }
    .stat-chip { padding: 3px 10px; font-size: .75rem; }

    /* 3-column grid on most phones, 2-column on very narrow */
    .inv-grid {
      padding: 14px 12px;

// ═══════════════════════════════════════════════════════
//  BARREL ROLL — MAIN GAME LOGIC
// ═══════════════════════════════════════════════════════

// ── Rarity weights ──────────────────────────────────────
const WEIGHTS = {
  common:    50,
  uncommon:  30,
  rare:      12,
  epic:       6,
  legendary:  2,
};

function pickRarity() {
  const total = Object.values(WEIGHTS).reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (const [rarity, w] of Object.entries(WEIGHTS)) {
    r -= w;
    if (r <= 0) return rarity;
  }
  return 'common';
}

// ── SVG bottle generator ────────────────────────────────
// item must have item.svgStyle = { shape, glass, label, accent, cap, short, tag }
function makeBottleSVG(item, size = 120) {
  const d  = item.svgStyle || { shape:'standard', glass:'#6B3A2A', label:'#1a1a1a', accent:'#d4af37', cap:'#333', short:'?', tag:'BOURBON' };
  const w  = size * 0.55;
  const h  = size;
  const cx = w / 2;
  const neckW = w * 0.3;
  const neckH = h * 0.22;
  const neckX = (w - neckW) / 2;
  // Use unique IDs based on item id + size to avoid SVG defs collisions
  const uid = (item.id + size).replace(/[^a-z0-9]/gi,'');
  const gid = 'g' + uid;
  const hid = 'h' + uid;
  const cid = 'c' + uid;

  function body(s) {
    switch (s) {
      case 'tall':
        return `M${neckX},${neckH} Q${neckX-w*.08},${h*.32} ${w*.09},${h*.42} L${w*.09},${h*.92} Q${w*.09},${h*.97} ${w*.21},${h*.97} L${w*.79},${h*.97} Q${w*.91},${h*.97} ${w*.91},${h*.92} L${w*.91},${h*.42} Q${w+w*.08-w*.08},${h*.32} ${neckX+neckW},${neckH} Z`;
      case 'squat':
        return `M${neckX},${neckH} Q${neckX-w*.16},${h*.28} ${w*.04},${h*.37} L${w*.04},${h*.89} Q${w*.04},${h*.97} ${w*.18},${h*.97} L${w*.82},${h*.97} Q${w*.96},${h*.97} ${w*.96},${h*.89} L${w*.96},${h*.37} Q${w+w*.16-w*.16},${h*.28} ${neckX+neckW},${neckH} Z`;
      case 'flask':
        return `M${neckX},${neckH} Q${neckX-w*.02},${h*.27} ${w*.14},${h*.36} L${w*.07},${h*.9} Q${w*.07},${h*.97} ${w*.22},${h*.97} L${w*.78},${h*.97} Q${w*.93},${h*.97} ${w*.93},${h*.9} L${w*.86},${h*.36} Q${w+w*.02-w*.02},${h*.27} ${neckX+neckW},${neckH} Z`;
      case 'round':
        return `M${neckX},${neckH} Q${neckX-w*.04},${h*.25} ${w*.02},${h*.44} Q${-w*.04},${h*.72} ${w*.1},${h*.88} Q${w*.18},${h*.97} ${w*.3},${h*.97} L${w*.7},${h*.97} Q${w*.82},${h*.97} ${w*.9},${h*.88} Q${w*1.04},${h*.72} ${w*.98},${h*.44} Q${w+w*.04-w*.04},${h*.25} ${neckX+neckW},${neckH} Z`;
      case 'decanter':
        return `M${neckX*.85},${neckH} Q${neckX*.85-w*.1},${h*.27} ${w*.05},${h*.37} Q${-w*.02},${h*.55} ${w*.02},${h*.75} L${w*.02},${h*.9} Q${w*.02},${h*.97} ${w*.15},${h*.97} L${w*.85},${h*.97} Q${w*.98},${h*.97} ${w*.98},${h*.9} L${w*.98},${h*.75} Q${w*1.02},${h*.55} ${w*.95},${h*.37} Q${w+w*.1-w*.1},${h*.27} ${neckX*.85+neckW*1.3},${neckH} Z`;
      case 'flared':
        return `M${neckX},${neckH} Q${neckX-w*.03},${h*.26} ${w*.1},${h*.36} Q${w*.01},${h*.5} ${w*.01},${h*.7} L${w*.01},${h*.9} Q${w*.01},${h*.97} ${w*.13},${h*.97} L${w*.87},${h*.97} Q${w*.99},${h*.97} ${w*.99},${h*.9} L${w*.99},${h*.7} Q${w*.99},${h*.5} ${w*.9},${h*.36} Q${w+w*.03-w*.03},${h*.26} ${neckX+neckW},${neckH} Z`;
      case 'cylindrical':
        return `M${neckX},${neckH} L${neckX},${h*.36} L${w*.06},${h*.4} L${w*.06},${h*.92} Q${w*.06},${h*.97} ${w*.18},${h*.97} L${w*.82},${h*.97} Q${w*.94},${h*.97} ${w*.94},${h*.92} L${w*.94},${h*.4} L${neckX+neckW},${h*.36} L${neckX+neckW},${neckH} Z`;
      default:
        return `M${neckX},${neckH} Q${neckX-w*.1},${h*.3} ${w*.1},${h*.4} L${w*.1},${h*.92} Q${w*.1},${h*.97} ${w*.22},${h*.97} L${w*.78},${h*.97} Q${w*.9},${h*.97} ${w*.9},${h*.92} L${w*.9},${h*.4} Q${w+w*.1-w*.1},${h*.3} ${neckX+neckW},${neckH} Z`;
    }
  }

  const lY  = h * .46;
  const lH  = h * .31;
  const lW  = w * .72;
  const lX  = (w - lW) / 2;
  const fs1 = Math.max(6, w * .15);
  const fs2 = Math.max(4, w * .074);

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
  <defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="${d.glass}" stop-opacity=".6"/>
      <stop offset="28%"  stop-color="${d.glass}" stop-opacity="1"/>
      <stop offset="65%"  stop-color="${d.glass}" stop-opacity=".85"/>
      <stop offset="100%" stop-color="${d.glass}" stop-opacity=".45"/>
    </linearGradient>
    <linearGradient id="${hid}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(255,255,255,0)"/>
      <stop offset="22%"  stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="45%"  stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="${cid}"><path d="${body(d.shape)}"/></clipPath>
  </defs>
  <ellipse cx="${cx}" cy="${h*.978}" rx="${w*.37}" ry="${h*.017}" fill="rgba(0,0,0,.45)"/>
  <path d="${body(d.shape)}" fill="url(#${gid})" stroke="${d.glass}" stroke-width=".8"/>
  <rect x="0" y="${h*.34}" width="${w}" height="${h*.65}" fill="${d.glass}" opacity=".5" clip-path="url(#${cid})"/>
  <rect x="${lX}" y="${lY}" width="${lW}" height="${lH}" rx="3" fill="${d.label}" opacity=".93"/>
  <rect x="${lX+2}" y="${lY+2}" width="${lW-4}" height="${lH-4}" rx="2" fill="none" stroke="${d.accent}" stroke-width="1.2" opacity=".8"/>
  <text x="${cx}" y="${lY+lH*.41}" font-family="Georgia,serif" font-weight="bold" font-size="${fs1}" fill="${d.accent}" text-anchor="middle" dominant-baseline="middle">${d.short}</text>
  <text x="${cx}" y="${lY+lH*.73}" font-family="Georgia,serif" font-size="${fs2}" fill="${d.accent}" text-anchor="middle" dominant-baseline="middle" opacity=".85">${d.tag}</text>
  <rect x="${neckX}" y="${h*.06}" width="${neckW}" height="${neckH*1.05}" rx="2" fill="url(#${gid})" stroke="${d.glass}" stroke-width=".6"/>
  <rect x="${neckX-1}" y="${h*.02}" width="${neckW+2}" height="${h*.07}" rx="2" fill="${d.cap}" stroke="rgba(0,0,0,.4)" stroke-width=".8"/>
  <rect x="${neckX}" y="${h*.02}" width="${neckW*.4}" height="${h*.07}" rx="2" fill="rgba(255,255,255,.13)"/>
  <path d="${body(d.shape)}" fill="url(#${hid})"/>
  <line x1="${w*.09}" y1="${h*.37}" x2="${w*.91}" y2="${h*.37}" stroke="${d.accent}" stroke-width=".6" opacity=".25" clip-path="url(#${cid})"/>
</svg>`;
}


// ── State ──────────────────────────────────────────────
const DEFAULT_STATE = { tickets: 5000, inventory: [] };
let state = loadState();

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('barrelroll_v2'));
    if (s && typeof s.tickets === 'number') return s;
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function saveState() {
  localStorage.setItem('barrelroll_v2', JSON.stringify(state));
}

// ── UI init ────────────────────────────────────────────
let isAnimating = false;

// Wire close button (can't use inline onclick — JS reassigns it for inspect mode)
document.getElementById('card-close-btn').onclick = closeReveal;

function refreshHUD() {
  document.getElementById('ticket-display').textContent = state.tickets.toLocaleString();
  document.getElementById('roll-btn').disabled = state.tickets < 1 || isAnimating;
}
refreshHUD();

// ── Roll logic ─────────────────────────────────────────
async function doRoll() {
  if (isAnimating || state.tickets < 1) return;
  isAnimating = true;
  state.tickets -= 1;
  saveState();
  refreshHUD();

  // ★ STEP 1: Determine rarity FIRST ★
  const rarity = pickRarity();

  // ★ STEP 2: Generate the item so we can show its actual bottle SVG ★
  const item = DB.generateBottle(rarity);

  const doorL  = document.getElementById('door-anim-left');
  const doorR  = document.getElementById('door-anim-right');
  const emerge = document.getElementById('bottle-emerge');

  // Reset state
  doorL.classList.remove('opening');
  doorR.classList.remove('opening');
  emerge.classList.remove('emerging');
  emerge.style.opacity = '0';
  emerge.innerHTML = '';

  // 1. Doors slide open
  doorL.classList.add('opening');
  doorR.classList.add('opening');
  await sleep(650);

  // 2. Bottle emerges — inject the real generated bottle SVG
  emerge.innerHTML = makeBottleSVG(item, 120);
  emerge.classList.add('emerging');
  await sleep(1200);

  // 3. Add to inventory and show reveal
  addToInventory(item);
  saveState();

  await sleep(200);
  showReveal(item);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function resetStoreAnim() {
  const doorL  = document.getElementById('door-anim-left');
  const doorR  = document.getElementById('door-anim-right');
  const emerge = document.getElementById('bottle-emerge');
  doorL.classList.remove('opening');
  doorR.classList.remove('opening');
  emerge.classList.remove('emerging');
  emerge.style.opacity = '0';
  emerge.innerHTML = '';
}

// ── Star rating renderer ───────────────────────────────
// Renders 5 SVG stars, partially filled to represent score 0–5
function renderStars(rating) {
  const full   = '#f0a830';
  const empty  = 'rgba(240,168,48,0.18)';
  const stroke = 'rgba(240,168,48,0.5)';
  const STAR = 'M12 2 L14.9 8.5 L22 9.3 L17 14 L18.5 21 L12 17.5 L5.5 21 L7 14 L2 9.3 L9.1 8.5 Z';

  return Array.from({length: 10}, (_, i) => {
    const fill = Math.min(1, Math.max(0, rating - i));
    const id = 'sg' + i + Math.random().toString(36).slice(2,5);
    if (fill >= 0.97) {
      return `<svg viewBox="0 0 24 24"><path d="${STAR}" fill="${full}" stroke="${stroke}" stroke-width="1"/></svg>`;
    } else if (fill <= 0.03) {
      return `<svg viewBox="0 0 24 24"><path d="${STAR}" fill="${empty}" stroke="${stroke}" stroke-width="1"/></svg>`;
    } else {
      return `<svg viewBox="0 0 24 24">
        <defs><clipPath id="${id}"><rect x="0" y="0" width="${fill * 24}" height="24"/></clipPath></defs>
        <path d="${STAR}" fill="${empty}" stroke="${stroke}" stroke-width="1"/>
        <path d="${STAR}" fill="${full}" stroke="none" clip-path="url(#${id})"/>
      </svg>`;
    }
  }).join('');
}

function populateCard(item) {
  const rarityLabel = item.rarity.charAt(0).toUpperCase() + item.rarity.slice(1);
  document.getElementById('rarity-badge').textContent    = rarityLabel;
  document.getElementById('item-icon').innerHTML         = makeBottleSVG(item, 120);
  document.getElementById('item-name').textContent       = item.name;
  document.getElementById('item-proof').textContent      = item.proof + ' pf';
  document.getElementById('item-msrp').textContent       = '~$' + item.msrp.toLocaleString();
  document.getElementById('item-stars').innerHTML        = renderStars(item.rating);
  document.getElementById('item-rating-num').textContent = item.rating.toFixed(2);
  document.getElementById('item-desc').textContent       = item.description || '';
  document.getElementById('item-card').className         = 'item-card ' + item.rarity;
}

function showReveal(item) {
  const overlay = document.getElementById('overlay');
  const card    = document.getElementById('item-card');

  populateCard(item);

  overlay.classList.add('active');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.style.display   = 'flex';
      card.style.transform = 'scale(0.7)';
      card.style.opacity   = '0';
      setTimeout(() => {
        card.style.transform = 'scale(1)';
        card.style.opacity   = '1';
      }, 30);
      card.classList.add('show');
    });
  });

  if (item.rarity === 'legendary') spawnParticles();
}

function closeReveal() {
  const overlay = document.getElementById('overlay');
  const card    = document.getElementById('item-card');
  overlay.classList.remove('active');
  card.classList.remove('show');
  card.style.transform = 'scale(0.7)';
  card.style.opacity   = '0';
  setTimeout(() => { card.style.display = 'none'; }, 350);
  stopParticles();
  resetStoreAnim();
  isAnimating = false;
  // Always restore default button state
  const btn = document.getElementById('card-close-btn');
  btn.textContent = 'Next ›';
  btn.onclick = closeReveal;
  refreshHUD();
}

// ── Particles ──────────────────────────────────────────
let particleInterval = null;
function spawnParticles() {
  const container = document.getElementById('particles');
  container.classList.add('active');
  let count = 0;
  particleInterval = setInterval(() => {
    if (count++ > 80) return;
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top  = '-10px';
    const colors = ['#ffd700','#ffec6e','#f0a830','#fff8e1','#c8720a'];
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    const sz = (4 + Math.random() * 8) + 'px';
    p.style.width  = sz;
    p.style.height = sz;
    p.style.animation = `particle-fall ${2 + Math.random()*3}s linear ${Math.random()*.5}s forwards`;
    container.appendChild(p);
    setTimeout(() => p.remove(), 6000);
  }, 60);
}
function stopParticles() {
  clearInterval(particleInterval);
  const container = document.getElementById('particles');
  container.classList.remove('active');
  container.innerHTML = '';
}

// ── Inventory ──────────────────────────────────────────
// Each inventory entry is a full bottle object + count.
// Since every pull generates a unique bottle, we store each individually
// but group by displayName for the cellar view.
function addToInventory(item) {
  // Group by full display name (same bottle type) for count stacking
  const existing = state.inventory.find(e => e.name === item.name && e.rarity === item.rarity);
  if (existing) {
    existing.count++;
    // Update msrp to latest roll (they vary slightly)
    existing.msrp = Math.round((existing.msrp + item.msrp) / 2);
  } else {
    state.inventory.push({ ...item, count: 1 });
  }
}

function openInventory() {
  renderInventory();
  document.getElementById('inv-panel').classList.add('open');
}
function closeInventory() {
  document.getElementById('inv-panel').classList.remove('open');
}

let currentSort = 'rarity';
function setSort(mode) {
  currentSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode).classList.add('active');
  renderInventory();
}

function renderInventory() {
  const grid  = document.getElementById('inv-grid');
  const stats = document.getElementById('inv-stats');
  grid.innerHTML  = '';
  stats.innerHTML = '';

  const counts = { common: 0, uncommon: 0, rare: 0, epic: 0, legendary: 0 };
  state.inventory.forEach(it => { counts[it.rarity] += it.count; });

  const labels = [
    ['c', 'Common',    counts.common],
    ['u', 'Uncommon',  counts.uncommon],
    ['r', 'Rare',      counts.rare],
    ['e', 'Epic',      counts.epic],
    ['l', 'Legendary', counts.legendary],
  ];
  labels.forEach(([cls, label, n]) => {
    if (n === 0) return;
    stats.innerHTML += `<div class="stat-chip ${cls}">${label}: ${n}</div>`;
  });

  const total      = Object.values(counts).reduce((a, b) => a + b, 0);
  const totalValue = state.inventory.reduce((sum, it) => sum + (it.msrp * it.count), 0);
  if (total > 0) {
    stats.innerHTML += `<div class="stat-chip" style="border-color:var(--amber);color:var(--amber-lt)">Total: ${total}</div>`;
    stats.innerHTML += `<div class="stat-chip" style="border-color:var(--amber-lt);color:var(--cream)">Est. Value: $${totalValue.toLocaleString()}</div>`;
  }

  const rarityOrder = ['legendary','epic','rare','uncommon','common'];
  const sorted = [...state.inventory].sort((a, b) => {
    switch (currentSort) {
      case 'value':  return b.msrp   - a.msrp;
      case 'proof':  return b.proof  - a.proof;
      case 'rating': return b.rating - a.rating;
      case 'alpha':  return a.name.localeCompare(b.name);
      default:       return rarityOrder.indexOf(a.rarity) - rarityOrder.indexOf(b.rarity);
    }
  });

  if (sorted.length === 0) {
    grid.innerHTML = '<div class="inv-empty">Your cellar is empty.<br>Open some barrels!</div>';
    return;
  }

  sorted.forEach(item => {
    const div = document.createElement('div');
    div.className = 'inv-item ' + item.rarity;
    div.style.cursor = 'pointer';
    div.innerHTML = `
      ${item.count > 1 ? `<div class="inv-count">×${item.count}</div>` : ''}
      <div class="i-icon">${makeBottleSVG(item, 80)}</div>
      <div class="i-name">${item.name}</div>
      <div class="i-proof">${item.proof} pf</div>
      <div class="i-msrp">~$${item.msrp.toLocaleString()}</div>
    `;
    div.addEventListener('click', () => {
      closeInventory();
      inspectItem(item);
    });
    grid.appendChild(div);
  });
}

// ── Inspect item from inventory ────────────────────────
function inspectItem(item) {
  const overlay = document.getElementById('overlay');
  const card    = document.getElementById('item-card');

  populateCard(item);
  document.getElementById('card-close-btn').textContent = '‹ Back to Cellar';

  overlay.classList.add('active');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.style.display   = 'flex';
      card.style.transform = 'scale(0.7)';
      card.style.opacity   = '0';
      setTimeout(() => {
        card.style.transform = 'scale(1)';
        card.style.opacity   = '1';
      }, 30);
      card.classList.add('show');
    });
  });

  if (item.rarity === 'legendary') spawnParticles();

  // Override close to return to inventory
  document.getElementById('card-close-btn').onclick = () => {
    closeReveal();
    openInventory();
  };
}

function confirmReset() {
  if (confirm('Reset your entire account? This will clear your cellar and restore 5,000 tickets.')) {
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    saveState();
    renderInventory();
    refreshHUD();
    showToast('Account reset. 5,000 tickets restored.');
  }
}

// ── Toast ──────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── PWA Service Worker ─────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'barrelroll-v6';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html', './data.js'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob  = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
</script>
